name: Deploy Docs to GitHub Pages

on:
  # Deploy on every push to the default branch.
  push:
    branches:
      - main
    # Only rebuild when documentation-related files change.
    paths:
      - "docs/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-docs.yml"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions required by the GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, without cancelling in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm --filter motion-drawer-doc build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/out

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
